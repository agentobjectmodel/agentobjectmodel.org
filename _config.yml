# GitHub Pages (Jekyll 3.x, same engine as github.com/pages/versions)
#
# - If `.nojekyll` exists at the site root, GitHub Pages skips Jekyll entirely and this file
#   is ignored (use an empty `.nojekyll` only when you want a fully static deploy).
# - Jekyll skips root entries whose names start with `.` unless listed under `include`.
#   Nested paths like `spec/.../.well-known/` are NOT reliably includable on Jekyll 3.10
#   (GitHub Pages); those templates live under `well-known-templates/` instead.
#
# https://docs.github.com/en/pages/getting-started-with-github-pages/about-github-pages#static-site-generators
include:
  - ".well-known"
